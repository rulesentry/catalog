name: Validate Contributions

on:
  pull_request:
    branches: [main]
    paths:
      - 'rules/**'
      - 'policies/**'
      - 'categories/**'
      - 'profiles/**'
      - 'regions/**'
      - 'publishers/**'
      - 'examples/**'
      - 'scripts/**'
      - 'json-schema/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run ci
